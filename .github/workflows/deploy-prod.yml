name: Prod deployment.

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/network-server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull qarani/network-server:latest
            docker stop network-server || true
            docker rm network-server || true
            docker network create mini-aws-network || true
            docker run -d --name network-server \
              --network mini-aws-network \
              -p 8084:8084 \
              -e APP_PROFILE=prod \
              -e DB_HOST=${{ secrets.PROD_DB_HOST }} \
              -e DB_PORT=5432 \
              -e DB_USER=${{ secrets.PROD_DB_USER }} \
              -e DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
              -e DB_NAME=${{ secrets.PROD_DB_NAME }} \
              -e NATS_URL=${{ secrets.PROD_NATS_URL }} \
              -e NATS_USER=${{ secrets.PROD_NATS_USER }} \
              -e NATS_PASSWORD=${{ secrets.PROD_NATS_PASSWORD }} \
              qarani/network-server:latest
