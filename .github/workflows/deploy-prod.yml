name: Prod deployment

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  prod-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install libvirt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvirt-dev \
            libvirt-daemon \
            pkg-config
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Run tests
        run: go test ./... -v

  prod-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: prod-test
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/network-server:prod

  prod-deploy:
    needs: prod-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Prod via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull qarani/network-server:prod
            docker service rm network-server-prod || true
            docker service create \
              --name network-server-prod \
              --network aws-prod-network \
              --publish published=8084,target=8084 \
              --cap-add NET_ADMIN \
              --cap-add NET_RAW \
              --cap-add SYS_ADMIN \
              --cap-add SYS_PTRACE \
              --env APP_PROFILE=prod \
              --env HTTP_PORT=8084 \
              --env PUBLIC_INTERFACE=eth0 \
              --env DB_HOST=postgres-prod \
              --env DB_PORT=5432 \
              --env DB_USER=postgres-prod-user \
              --env DB_PASSWORD=postgres-prod-password \
              --env DB_NAME=network_db \
              --env DB_SSLMODE=disable \
              --env NATS_URL=nats://nats-prod:4222 \
              --env NATS_USER=nats-prod-user \
              --env NATS_PASSWORD=nats-prod-password \
              --env NATS_SUBJECT_PREFIX=prod.v1 \
              --env EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka \
              --env EUREKA_APP_NAME=NETWORK-SERVICE \
              --env EUREKA_HOSTNAME=network-server-prod \
              --env EUREKA_IP_ADDR=network-server-prod \
              --env EUREKA_VIP_ADDRESS=network-service \
              --env EUREKA_INSTANCE_ID=network-service-prod:8084 \
              qarani/network-server:prod